name: Go Fuzz

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./internal/pipeline -fuzz=FuzzEncryptStagePayload -fuzztime=30s
      - run: go test ./internal/pipeline -fuzz=FuzzEncryptDecryptStagePayloadRoundTrip -fuzztime=30s
