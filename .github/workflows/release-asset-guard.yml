name: Release Asset Guard

on:
  release:
    types: [published, edited, released, prereleased]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate (example: v0.4.6)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target release
        id: release
        uses: actions/github-script@v9
        with:
          script: |
            const tag = context.eventName === "workflow_dispatch"
              ? core.getInput("tag")
              : context.payload.release?.tag_name;

            if (!tag) {
              core.setFailed("Unable to resolve release tag.");
              return;
            }

            if (!/^v/.test(tag)) {
              core.info(`Skipping non-version tag: ${tag}`);
              core.setOutput("skip", "true");
              return;
            }

            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            core.setOutput("skip", "false");
            core.setOutput("tag", tag);
            core.setOutput("release_id", String(release.data.id));

      - name: Validate required release assets
        if: steps.release.outputs.skip != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const releaseId = Number("${{ steps.release.outputs.release_id }}");
            const tag = "${{ steps.release.outputs.tag }}";

            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            const assets = release.data.assets ?? [];
            const byName = new Map(assets.map((asset) => [asset.name, asset]));
            const required = [
              "mantlerd-linux-amd64",
              "mantlerd-linux-amd64.sha256",
              "mantlerd-linux-arm64",
              "mantlerd-linux-arm64.sha256",
              "mantlerd-darwin-amd64",
              "mantlerd-darwin-amd64.sha256",
              "mantlerd-darwin-arm64",
              "mantlerd-darwin-arm64.sha256",
            ];

            const missing = required.filter((name) => !byName.has(name));
            const empty = required.filter((name) => byName.has(name) && (byName.get(name).size ?? 0) <= 0);
            const tinyChecksums = required
              .filter((name) => name.endsWith(".sha256"))
              .filter((name) => byName.has(name) && (byName.get(name).size ?? 0) < 32);

            if (missing.length || empty.length || tinyChecksums.length) {
              const lines = [
                `Release ${tag} failed asset validation.`,
                missing.length ? `Missing assets: ${missing.join(", ")}` : null,
                empty.length ? `Empty assets: ${empty.join(", ")}` : null,
                tinyChecksums.length ? `Suspiciously small checksum files: ${tinyChecksums.join(", ")}` : null,
              ].filter(Boolean);
              core.setFailed(lines.join("\n"));
              return;
            }

            core.info(`Release ${tag} has all required assets with non-zero sizes.`);
