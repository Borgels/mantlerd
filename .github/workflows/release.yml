name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for ldflags (defaults to tag name)"
        required: false
        type: string

permissions:
  contents: write
  id-token: write    # required for SLSA provenance signing
  attestations: write

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build-and-release:
    needs: test-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            case "${{ github.event.inputs.version }}" in
              v*) ;;
              *)
                echo "Version input must start with 'v' (example: v0.1.18)" >&2
                exit 1
                ;;
            esac
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release assets
        run: |
          chmod +x scripts/release-build.sh
          scripts/release-build.sh "${{ steps.version.outputs.value }}"

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/mantlerd-linux-amd64
            dist/mantlerd-linux-arm64
            dist/mantlerd-darwin-amd64
            dist/mantlerd-darwin-arm64

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          files: |
            dist/mantlerd-linux-amd64
            dist/mantlerd-linux-amd64.sha256
            dist/mantlerd-linux-arm64
            dist/mantlerd-linux-arm64.sha256
            dist/mantlerd-darwin-amd64
            dist/mantlerd-darwin-amd64.sha256
            dist/mantlerd-darwin-arm64
            dist/mantlerd-darwin-arm64.sha256
            dist/checksums.txt
          draft: false
          prerelease: false
