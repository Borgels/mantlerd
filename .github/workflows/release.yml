name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for ldflags (defaults to tag name)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release assets
        run: |
          chmod +x scripts/release-build.sh
          scripts/release-build.sh "${{ steps.version.outputs.value }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          name: ${{ steps.version.outputs.value }}
          files: |
            dist/clawcontrol-agent-linux-amd64
            dist/clawcontrol-agent-linux-amd64.sha256
            dist/clawcontrol-agent-linux-arm64
            dist/clawcontrol-agent-linux-arm64.sha256
            dist/clawcontrol-agent-darwin-amd64
            dist/clawcontrol-agent-darwin-amd64.sha256
            dist/clawcontrol-agent-darwin-arm64
            dist/clawcontrol-agent-darwin-arm64.sha256
          draft: false
          prerelease: false
